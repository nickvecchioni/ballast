{{- if .Values.sidecar.enabled }}
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "infracost.fullname" . }}-sidecar-injector
  labels:
    {{- include "infracost.labels" . | nindent 4 }}
webhooks:
  - name: sidecar.infracost.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    reinvocationPolicy: IfNeeded
    clientConfig:
      service:
        name: {{ include "infracost.fullname" . }}-controller
        namespace: {{ .Release.Namespace }}
        path: /mutate-pod-sidecar
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
        scope: Namespaced
    objectSelector:
      matchExpressions:
        - key: {{ .Values.sidecar.injectLabel }}
          operator: In
          values: ["true"]
    {{- with .Values.sidecar.namespaceSelector }}
    namespaceSelector:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    failurePolicy: Ignore
    timeoutSeconds: 10
{{- end }}
