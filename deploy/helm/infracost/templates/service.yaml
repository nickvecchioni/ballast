apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-engine
  labels:
    app.kubernetes.io/name: infracost-engine
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
    - port: 9090
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app.kubernetes.io/name: infracost-engine
