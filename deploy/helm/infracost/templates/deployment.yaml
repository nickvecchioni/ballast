apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-engine
  labels:
    app.kubernetes.io/name: infracost-engine
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.engine.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: infracost-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infracost-engine
    spec:
      serviceAccountName: {{ .Release.Name }}
      containers:
        - name: engine
          image: "{{ .Values.engine.image.repository }}:{{ .Values.engine.image.tag }}"
          imagePullPolicy: {{ .Values.engine.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9090
          resources:
            {{- toYaml .Values.engine.resources | nindent 12 }}
