apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-victoriametrics
  labels:
    app.kubernetes.io/name: infracost-victoriametrics
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  serviceName: {{ .Release.Name }}-victoriametrics
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: infracost-victoriametrics
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infracost-victoriametrics
    spec:
      containers:
        - name: victoriametrics
          image: victoriametrics/victoria-metrics:v1.101.0
          args:
            - -retentionPeriod=12
            - -storageDataPath=/storage
          ports:
            - containerPort: 8428
              name: http
          volumeMounts:
            - name: storage
              mountPath: /storage
  volumeClaimTemplates:
    - metadata:
        name: storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
