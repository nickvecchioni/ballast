apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "infracost.fullname" . }}-collector
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "infracost.collector.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "infracost.collector.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        {{- include "infracost.collector.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.collector.metricsPort | quote }}
        prometheus.io/path: "/metrics"
        checksum/pricing: {{ include (print .Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "infracost.serviceAccountName" . }}
      {{- if .Values.collector.hostPID }}
      hostPID: true
      {{- end }}
      {{- with .Values.collector.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.collector.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: collector
          image: "{{ .Values.collector.image.repository }}:{{ .Values.collector.image.tag }}"
          imagePullPolicy: {{ .Values.collector.image.pullPolicy }}
          args:
            - --node-name=$(NODE_NAME)
            - --pricing-config=/etc/infracost/pricing.yaml
            - --listen-address=:{{ .Values.collector.metricsPort }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: LD_LIBRARY_PATH
              value: /usr/local/nvidia/lib64
            {{- with .Values.collector.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.collector.metricsPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
          {{- with .Values.collector.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.collector.resources | nindent 12 }}
          volumeMounts:
            - name: pod-resources
              mountPath: /var/lib/kubelet/pod-resources
              readOnly: true
            - name: pricing-config
              mountPath: /etc/infracost
              readOnly: true
            - name: nvidia-libs
              mountPath: /usr/local/nvidia
              readOnly: true
            {{- if .Values.collector.hostPID }}
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
            {{- end }}
      terminationGracePeriodSeconds: 10
      volumes:
        - name: pod-resources
          hostPath:
            path: /var/lib/kubelet/pod-resources
            type: Directory
        - name: pricing-config
          configMap:
            name: {{ include "infracost.fullname" . }}-pricing
        - name: nvidia-libs
          hostPath:
            path: {{ .Values.collector.nvidiaDriverPath }}
            type: Directory
        {{- if .Values.collector.hostPID }}
        - name: host-proc
          hostPath:
            path: /proc
            type: Directory
        {{- end }}
