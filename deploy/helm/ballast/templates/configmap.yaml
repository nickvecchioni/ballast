apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ballast.fullname" . }}-pricing
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ballast.labels" . | nindent 4 }}
data:
  pricing.yaml: |
    gpu_types:
    {{- range $name, $config := .Values.pricing.gpu_types }}
      {{ $name }}:
        cost_per_hour_usd: {{ $config.cost_per_hour_usd }}
    {{- end }}
